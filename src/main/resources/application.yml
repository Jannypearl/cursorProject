spring:
  application:
    name: data-migration

  # 应用自身数据库 MySQL
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:data_migration}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

# 迁移任务 CSV 文件存储目录（可配置）
migration:
  csv:
    base-dir: ${MIGRATION_CSV_DIR:./migration-csv}

server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    com.example.datamigration: DEBUG
