# 复制为 application.yml 或通过环境变量覆盖
# 应用自身 MySQL
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/data_migration?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_mysql_password

# 迁移 CSV 目录
migration:
  csv:
    base-dir: ./migration-csv
